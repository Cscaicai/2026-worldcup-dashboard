name: 自动更新比分 v2

on:
  # 赛时高频轮询：每30分钟 (覆盖所有比赛窗口)
  # 比赛在北京时间凌晨3点到下午2点之间 = UTC 19:00 ~ UTC 06:00
  # 加宽覆盖：从UTC 16:00到UTC 10:00确保无遗漏
  schedule:
    - cron: '*/30 16-23 * 6 *'   # 6月 UTC 16-23点（每30分钟）
    - cron: '*/30 0-10 * 6 *'    # 6月 UTC 0-10点（每30分钟）
    - cron: '*/30 16-23 * 7 *'   # 7月 UTC 16-23点（每30分钟）
    - cron: '*/30 0-10 * 7 *'    # 7月 UTC 0-10点（每30分钟）
  # 也可以手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行比分更新脚本 (双源验证)
        run: python scripts/update_scores.py

      - name: 检查是否有变更
        id: check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ 有新的比分数据"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️  无需更新"
          fi

      - name: 提交并推送更新
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "World Cup Bot"
          git config user.email "bot@cscaicai.github.io"
          git add index.html scripts/update_scores.py
          git commit -m "⚽ 自动更新比分 - $(date '+%Y-%m-%d %H:%M UTC')"
          git push
